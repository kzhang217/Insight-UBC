<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Sections Insights</title>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<style>
		* {
			box-sizing: border-box;
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}
		body {
			margin: 0;
			padding: 20px;
			background: #f5f5f7;
			color: #222;
		}

		h1 {
			margin: 0 0 8px;
		}
		.subtitle {
			margin-bottom: 16px;
			font-size: 14px;
			color: #555;
		}

		.top-bar {
			display: flex;
			gap: 16px;
			align-items: stretch;
			margin-bottom: 16px;
		}

		.dropzone {
			flex: 1;
			border: 2px dashed #c5c5c7;
			border-radius: 10px;
			background: #ffffff;
			padding: 20px;
			text-align: center;
			cursor: pointer;
			transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
		}
		.dropzone.dragover {
			border-color: #0070f3;
			background: #eef4ff;
			box-shadow: 0 0 0 2px rgba(0,112,243,0.2);
		}
		.dropzone p {
			margin: 4px 0;
			font-size: 14px;
		}
		#fileName {
			margin-top: 8px;
			font-size: 12px;
			color: #555;
			word-break: break-all;
		}
		.dropzone input[type="file"] {
			display: none;
		}

		.id-panel {
			width: 250px;
			background: #ffffff;
			border-radius: 10px;
			padding: 14px;
			box-shadow: 0 2px 6px rgba(0,0,0,0.06);
			display: flex;
			flex-direction: column;
			gap: 8px;
		}
		.id-panel label {
			font-size: 13px;
			font-weight: 600;
		}
		.id-panel input[type="text"] {
			padding: 6px 8px;
			border-radius: 6px;
			border: 1px solid #d0d0d4;
			font-size: 14px;
		}

		button {
			padding: 7px 11px;
			border-radius: 6px;
			border: none;
			cursor: pointer;
			font-size: 13px;
			font-weight: 600;
			color: #ffffff;
			background: #0070f3;
			transition: background 0.15s, transform 0.05s;
		}
		button:hover {
			background: #005ad1;
		}
		button:active {
			transform: translateY(1px);
		}
		button:disabled {
			opacity: 0.6;
			cursor: default;
			transform: none;
		}
		.view-btn {
			background: #6366f1;
		}
		.view-btn:hover {
			background: #4f46e5;
		}
		.remove-btn {
			background: #e11d48;
		}
		.remove-btn:hover {
			background: #be123c;
		}

		.status {
			min-height: 18px;
			font-size: 13px;
			margin-bottom: 10px;
		}
		.status.success {
			color: #166534;
		}
		.status.error {
			color: #b91c1c;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			background: #ffffff;
			border-radius: 10px;
			overflow: hidden;
			box-shadow: 0 2px 6px rgba(0,0,0,0.06);
		}
		thead {
			background: #f3f4f6;
		}
		th, td {
			padding: 10px 12px;
			font-size: 14px;
			border-bottom: 1px solid #e5e7eb;
			text-align: left;
		}
		tr:last-child td {
			border-bottom: none;
		}
		th {
			font-weight: 600;
			color: #374151;
		}
		td.actions {
			white-space: nowrap;
		}

		.modal-backdrop {
			position: fixed;
			inset: 0;
			background: rgba(15, 23, 42, 0.45);
			display: none;
			align-items: center;
			justify-content: center;
			z-index: 1000;
		}
		.modal {
			background: #ffffff;
			border-radius: 12px;
			padding: 16px 18px 18px;
			width: 640px;
			max-width: 90%;
			box-shadow: 0 20px 40px rgba(0,0,0,0.25);
		}
		.modal-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 8px;
		}
		.modal-header h2 {
			margin: 0;
			font-size: 16px;
		}
		.modal-close {
			background: transparent;
			color: #6b7280;
			font-size: 18px;
			padding: 0 4px;
		}
		.modal-close:hover {
			background: #f3f4f6;
		}
		.modal-body {
			padding-top: 8px;
		}
		.chart-wrapper {
			width: 100%;
			height: 320px;
		}

		@media (max-width: 768px) {
			.top-bar {
				flex-direction: column;
			}
			.id-panel {
				width: 100%;
			}
		}
	</style>
</head>
<body>
<h1>Sections Insights</h1>
<div class="subtitle">Upload Sections datasets, manage them, and explore three visual insights for each dataset.</div>

<div class="status" id="status"></div>

<div class="top-bar">
	<div class="dropzone" id="dropzone">
		<input type="file" id="fileInput" accept=".zip">
		<p><strong>Drop a Sections .zip file here</strong></p>
		<p>or click to choose from your computer</p>
		<div id="fileName"></div>
	</div>

	<div class="id-panel">
		<label for="datasetId">Dataset ID</label>
		<input type="text" id="datasetId" placeholder="e.g. sections1">
		<button id="addBtn">Add Dataset</button>
	</div>
</div>

<table aria-label="Added datasets">
	<thead>
	<tr>
		<th style="width: 30%;">ID</th>
		<th>Avg Grade by Department</th>
		<th>Section Count by Course</th>
		<th>Avg Grade by Year</th>
		<th>Remove</th>
	</tr>
	</thead>
	<tbody id="datasetsBody">
	</tbody>
</table>

<div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
	<div class="modal">
		<div class="modal-header">
			<h2 id="modalTitle">Insight</h2>
			<button id="modalClose" class="modal-close" aria-label="Close">&times;</button>
		</div>
		<div class="modal-body">
			<div class="chart-wrapper">
				<canvas id="insightChart"></canvas>
			</div>
		</div>
	</div>
</div>

<script src="main.js"></script>
</body>
</html>
